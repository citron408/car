<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motor Control</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 2rem; }
      
      .button-grid {
        display: grid;
        grid-template-columns: repeat(3, 120px);
        grid-template-rows: repeat(3, 120px);
        gap: 10px;
        justify-content: center;
        margin: 2rem 0;
      }
      
      button {
        font-size: 1rem;
        font-weight: bold;
        border: 2px solid #333;
        border-radius: 8px;
        cursor: pointer;
        background-color: #4CAF50;
        color: white;
        transition: background-color 0.2s;
      }
      
      button:hover {
        background-color: #45a049;
      }
      
      button:active {
        background-color: #3d8b40;
      }
      
      #forward { grid-column: 2; grid-row: 1; }
      #left { grid-column: 1; grid-row: 2; }
      #stop {
        grid-column: 2;
        grid-row: 2;
        background-color: #b1f436;
        font-size: 1.2rem;
      }
      #stop:hover { background-color: #ccda0b; }
      #stop:active { background-color: #2800ba; }
      #turnRight { grid-column: 3; grid-row: 2; }
      #backward { grid-column: 2; grid-row: 3; }
      
      #status { margin-top: 2rem; }

      .camera-panel {
        max-width: 760px;
        margin: 1.5rem auto 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 1rem;
      }

      .camera-feed {
        width: 100%;
        max-width: 720px;
        border-radius: 6px;
        border: 1px solid #999;
      }

      #cameraHealth {
        margin-top: 0.5rem;
        font-size: 0.95rem;
      }

      #detectionList {
        margin-top: 0.5rem;
        min-height: 1.2rem;
      }
    </style>
  </head>
  <body>
    <h1>Motor Control</h1>

    <div class="button-grid">
      <button id="forward">↑ Forward</button>
      <button id="left">← Left</button>
      <button id="stop">STOP</button>
      <button id="turnRight">Right →</button>
      <button id="backward">↓ Backward</button>
    </div>

    <div style="text-align:center; margin-top:1rem;">
      <button id="led" class="led-button">
        <img src="/static/lightbulb-icon.svg" alt="LED" style="width: 50px; height: 50px;" />
      </button>
    </div>

    <div id="status">Status: <span id="statusText">idle</span></div>

    <div class="camera-panel">
      <h2>Camera + Object Detection</h2>
      <img id="cameraFeed" class="camera-feed" src="/camera/stream" alt="camera stream" />
      <div id="cameraHealth">Camera status: loading...</div>
      <div><strong>Detections:</strong></div>
      <ul id="detectionList"></ul>
    </div>

    <script src="/static/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motor Control</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 2rem; }
      
      .button-grid {
        display: grid;
        grid-template-columns: repeat(3, 120px);
        grid-template-rows: repeat(3, 120px);
        gap: 10px;
        justify-content: center;
        margin: 2rem 0;
      }
      
      button {
        font-size: 1rem;
        font-weight: bold;
        border: 2px solid #333;
        border-radius: 8px;
        cursor: pointer;
        background-color: #4CAF50;
        color: white;
        transition: background-color 0.2s;
      }
      
      button:hover {
        background-color: #45a049;
      }
      
      button:active {
        background-color: #3d8b40;
      }
      
      #forward { grid-column: 2; grid-row: 1; }
      #left { grid-column: 1; grid-row: 2; }
      #stop {
        grid-column: 2;
        grid-row: 2;
        background-color: #f44336;
        font-size: 1.2rem;
      }
      #stop:hover { background-color: #da190b; }
      #stop:active { background-color: #ba0000; }
      #turnRight { grid-column: 3; grid-row: 2; }
      #backward { grid-column: 2; grid-row: 3; }
      
      #status { margin-top: 2rem; }
    </style>
  </head>
  <body>
    <h1>Motor Control</h1>

    <div class="button-grid">
      <button id="forward">↑ Forward</button>
      <button id="left">← Left</button>
      <button id="stop">STOP</button>
      <button id="turnRight">Right ⇉</button>
      <button id="backward">↓ Backward</button>
    </div>

    <div id="status">Status: <span id="statusText">idle</span></div>

    <script src="/static/main.js"></script>
  </body>
</html>
